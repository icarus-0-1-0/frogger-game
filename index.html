<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frogger - Qwen3.5 Test</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #2c3e50 0%, #1a252f 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #gameContainer {
            position: relative;
            border: 4px solid #f1c40f;
            border-radius: 10px;
            box-shadow: 0 0 40px rgba(241, 196, 15, 0.6);
        }
        canvas { display: block; background: #000; border-radius: 6px; }
        #ui {
            position: absolute;
            top: -50px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 10px;
            color: #f1c40f;
            font-size: 20px;
            font-weight: bold;
        }
        #gameOver, #levelComplete {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95);
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            color: #f1c40f;
            display: none;
            border: 3px solid #f1c40f;
            min-width: 300px;
        }
        #gameOver h2, #levelComplete h2 { 
            font-size: 32px; 
            margin-bottom: 15px;
        }
        #gameOver h2 { color: #e74c3c; }
        #levelComplete h2 { color: #2ecc71; }
        p { font-size: 20px; margin-bottom: 25px; }
        button {
            background: #f1c40f;
            color: #2c3e50;
            border: none;
            padding: 12px 35px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        button:hover {
            background: #f39c12;
            transform: scale(1.05);
        }
        #instructions {
            position: absolute;
            bottom: -60px;
            left: 0;
            width: 100%;
            text-align: center;
            color: #ecf0f1;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="ui">
            <div>Score: <span id="score">0</span></div>
            <div>Lives: <span id="lives">3</span></div>
            <div>Level: <span id="level">1</span></div>
        </div>
        <canvas id="gameCanvas" width="600" height="525"></canvas>
        <div id="gameOver">
            <h2>GAME OVER</h2>
            <p>Final Score: <span id="finalScore">0</span></p>
            <button onclick="restartGame()">Try Again</button>
        </div>
        <div id="levelComplete">
            <h2>LEVEL COMPLETE!</h2>
            <p>Get ready for level <span id="nextLevel">2</span></p>
            <button onclick="nextLevel()">Continue</button>
        </div>
        <div id="instructions">
            Arrow Keys or WASD to move | Reach the green zones at the top!
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const livesEl = document.getElementById('lives');
        const levelEl = document.getElementById('level');
        const gameOverEl = document.getElementById('gameOver');
        const levelCompleteEl = document.getElementById('levelComplete');
        const finalScoreEl = document.getElementById('finalScore');
        const nextLevelEl = document.getElementById('nextLevel');

        const GRID = 75;
        let gameRunning = true;
        let score = 0;
        let lives = 3;
        let level = 1;
        let frog = { x: 3.5 * GRID, y: 6 * GRID, width: 50, height: 50 };
        let logs = [];
        let turtles = [];
        let cars = [];
        let safeZones = [];
        let moveCooldown = 0;
        let canMove = true;

        function initLevel() {
            frog = { x: 3.5 * GRID, y: 6 * GRID, width: 50, height: 50 };
            logs = [];
            turtles = [];
            cars = [];
            safeZones = [];

            const speedMult = 1 + (level - 1) * 0.2;

            for (let i = 0; i < 8; i++) {
                if (i % 2 === 0) {
                    safeZones.push({ x: i * GRID + 10, y: GRID * 0.5, width: GRID - 20, height: GRID - 10 });
                }
            }

            const turtleSpeed = 1.5 * speedMult;
            for (let i = 0; i < 3; i++) {
                turtles.push({
                    x: i * 2.5 * GRID, y: 1.5 * GRID, width: GRID * 2, height: GRID - 10,
                    speed: -turtleSpeed, submerged: false, submergeTimer: 0
                });
            }

            const logSpeed = 2 * speedMult;
            for (let i = 0; i < 3; i++) {
                logs.push({
                    x: i * 2.5 * GRID, y: 2.5 * GRID, width: GRID * 2, height: GRID - 10, speed: logSpeed
                });
            }

            const turtleSpeed2 = 2 * speedMult;
            for (let i = 0; i < 4; i++) {
                turtles.push({
                    x: i * 2 * GRID, y: 3.5 * GRID, width: GRID * 1.5, height: GRID - 10,
                    speed: -turtleSpeed2, submerged: false, submergeTimer: 0
                });
            }

            const logSpeed2 = 2.5 * speedMult;
            for (let i = 0; i < 2; i++) {
                logs.push({
                    x: i * 3.5 * GRID, y: 4.5 * GRID, width: GRID * 3, height: GRID - 10, speed: -logSpeed2
                });
            }

            const carSpeed = 3 * speedMult;
            for (let i = 0; i < 3; i++) {
                cars.push({
                    x: i * 2.5 * GRID, y: 5.5 * GRID, width: GRID * 1.5, height: GRID - 15,
                    speed: carSpeed, color: ['#e74c3c', '#3498db', '#9b59b6'][i % 3]
                });
            }
        }

        document.addEventListener('keydown', e => {
            if (canMove && gameRunning) moveFrog(e.key);
        });

        function moveFrog(key) {
            if (moveCooldown > 0) return;
            let newX = frog.x, newY = frog.y;

            if (key === 'ArrowUp' || key === 'w') newY -= GRID;
            else if (key === 'ArrowDown' || key === 's') newY += GRID;
            else if (key === 'ArrowLeft' || key === 'a') newX -= GRID;
            else if (key === 'ArrowRight' || key === 'd') newX += GRID;
            else return;

            frog.x = Math.max(GRID / 2, Math.min(canvas.width - GRID / 2, newX));
            frog.y = Math.max(GRID / 2, Math.min(canvas.height - GRID / 2, newY));
            moveCooldown = 10;
        }

        function update() {
            if (!gameRunning) return;
            if (moveCooldown > 0) moveCooldown--;

            logs.forEach(log => {
                log.x += log.speed;
                if (log.speed > 0 && log.x > canvas.width) log.x = -log.width;
                if (log.speed < 0 && log.x + log.width < 0) log.x = canvas.width;
            });

            turtles.forEach(turtle => {
                turtle.x += turtle.speed;
                if (turtle.speed > 0 && turtle.x > canvas.width) turtle.x = -turtle.width;
                if (turtle.speed < 0 && turtle.x + turtle.width < 0) turtle.x = canvas.width;
                turtle.submergeTimer++;
                if (turtle.submergeTimer > 180) {
                    turtle.submerged = !turtle.submerged;
                    turtle.submergeTimer = 0;
                }
            });

            cars.forEach(car => {
                car.x += car.speed;
                if (car.speed > 0 && car.x > canvas.width) car.x = -car.width;
                if (car.speed < 0 && car.x + car.width < 0) car.x = canvas.width;
            });

            checkCollisions();
        }

        function rectOverlap(a, b) {
            return a.x < b.x + b.width && a.x + a.width > b.x && a.y < b.y + b.height && a.y + a.height > b.y;
        }

        function checkCollisions() {
            const frogRect = { x: frog.x - 25, y: frog.y - 25, width: 50, height: 50 };
            const row = Math.floor(frog.y / GRID);

            if (row >= 1 && row <= 4) {
                let onObject = false;
                for (let log of logs) {
                    if (rectOverlap(frogRect, log)) { frog.x += log.speed; onObject = true; break; }
                }
                if (!onObject) {
                    for (let turtle of turtles) {
                        if (rectOverlap(frogRect, turtle) && !turtle.submerged) {
                            frog.x += turtle.speed; onObject = true; break;
                        }
                    }
                }
                if (!onObject && frog.y < 5 * GRID) loseLife();
            }

            if (row === 5) {
                for (let car of cars) {
                    if (rectOverlap(frogRect, car)) { loseLife(); break; }
                }
            }

            if (row === 0) {
                let inSafeZone = false;
                for (let zone of safeZones) {
                    if (rectOverlap(frogRect, zone)) { inSafeZone = true; break; }
                }
                if (inSafeZone) levelComplete(); else loseLife();
            }

            frog.x = Math.max(GRID / 2, Math.min(canvas.width - GRID / 2, frog.x));
        }

        function loseLife() {
            lives--;
            livesEl.textContent = lives;
            if (lives <= 0) endGame();
            else { frog.x = 3.5 * GRID; frog.y = 6 * GRID; }
        }

        function levelComplete() {
            gameRunning = false;
            score += 100 * level;
            scoreEl.textContent = score;
            nextLevelEl.textContent = level + 1;
            levelCompleteEl.style.display = 'block';
        }

        function nextLevel() {
            level++;
            levelEl.textContent = level;
            levelCompleteEl.style.display = 'none';
            gameRunning = true;
            initLevel();
        }

        function endGame() {
            gameRunning = false;
            finalScoreEl.textContent = score;
            gameOverEl.style.display = 'block';
        }

        function restartGame() {
            score = 0; lives = 3; level = 1;
            scoreEl.textContent = '0'; livesEl.textContent = '3'; levelEl.textContent = '1';
            gameOverEl.style.display = 'none';
            gameRunning = true;
            initLevel();
        }

        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#3498db';
            ctx.fillRect(0, GRID, canvas.width, GRID * 4);

            ctx.fillStyle = '#34495e';
            ctx.fillRect(0, GRID * 5, canvas.width, GRID);

            ctx.fillStyle = '#27ae60';
            ctx.fillRect(0, GRID * 6, canvas.width, GRID);

            ctx.fillStyle = '#2ecc71';
            safeZones.forEach(zone => ctx.fillRect(zone.x, zone.y, zone.width, zone.height));

            ctx.fillStyle = '#d35400';
            logs.forEach(log => {
                ctx.fillRect(log.x, log.y, log.width, log.height);
                ctx.fillStyle = '#e67e22';
                ctx.fillRect(log.x + 5, log.y + 5, log.width - 10, log.height - 10);
                ctx.fillStyle = '#d35400';
            });

            turtles.forEach(turtle => {
                ctx.fillStyle = turtle.submerged ? 'rgba(52, 152, 219, 0.5)' : '#16a085';
                ctx.fillRect(turtle.x, turtle.y, turtle.width, turtle.height);
                ctx.fillStyle = '#1abc9c';
                for (let i = 0; i < turtle.width; i += 20) {
                    ctx.beginPath();
                    ctx.arc(turtle.x + i + 10, turtle.y + turtle.height / 2, 8, 0, Math.PI * 2);
                    ctx.fill();
                }
            });

            cars.forEach(car => {
                ctx.fillStyle = car.color;
                ctx.fillRect(car.x, car.y, car.width, car.height);
                ctx.fillStyle = '#ecf0f1';
                ctx.fillRect(car.x + 10, car.y + 5, car.width - 20, car.height / 3);
            });

            ctx.fillStyle = '#2ecc71';
            ctx.beginPath();
            ctx.arc(frog.x, frog.y, frog.width / 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(frog.x - 12, frog.y - 10, 8, 0, Math.PI * 2);
            ctx.arc(frog.x + 12, frog.y - 10, 8, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(frog.x - 12, frog.y - 10, 4, 0, Math.PI * 2);
            ctx.arc(frog.x + 12, frog.y - 10, 4, 0, Math.PI * 2);
            ctx.fill();

            requestAnimationFrame(loop);
        }

        function loop() { update(); draw(); }

        initLevel();
        loop();
    </script>
</body>
</html>
